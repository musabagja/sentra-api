services:
  sentra-api:
    image: sentra-api:latest
    build:
      context: .
    container_name: sentra-api
    ports:
      - "3000:5000"
    depends_on:
      sentra-db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env

  # ─── PostgreSQL (default) ──────────────────────────────────────────────────
  sentra-db:
    image: postgres:18
    container_name: sentra-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── SQL Server (optional — use with DATABASE_PROVIDER=sqlserver) ─────────
  # To use: comment out sentra-db above, uncomment this block, and update .env
  # sentra-mssql:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   container_name: sentra-mssql
  #   restart: unless-stopped
  #   environment:
  #     ACCEPT_EULA: "Y"
  #     MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
  #     MSSQL_PID: Express
  #   ports:
  #     - "1433:1433"
  #   volumes:
  #     - mssql_data:/var/opt/mssql
  #   healthcheck:
  #     test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' -No -C || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

volumes:
  postgres_data:
  # mssql_data:
